    role="img"
    aria-labelledby="languages-title languages-description"
  >
    <title id="languages-title">TheStreamCode repository languages</title>
    <desc id="languages-description">Languages ranked by their presence across original, active, public repositories owned by TheStreamCode.</desc>
    <defs>
      <linearGradient id="languages-accent" x1="0" x2="1">
        <stop stop-color="#2563EB" />
        <stop offset="1" stop-color="#0EA5E9" />
      </linearGradient>
    </defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .heading { fill: #1F2328; font-size: 22px; font-weight: 700; }
      .muted { fill: #59636E; font-size: 13px; }
      .language { fill: #1F2328; font-size: 13px; font-weight: 600; }
      .count { fill: #59636E; font-size: 12px; }
    </style>
    <rect x=".5" y=".5" width="879" height="229" rx="16" fill="#F6F8FA" stroke="#D0D7DE" />
    <rect x="1" y="1" width="878" height="4" rx="2" fill="url(#languages-accent)" />

