<svg
    xmlns="http://www.w3.org/2000/svg"
    width="880"
    height="230"
    viewBox="0 0 880 230"
    role="img"
    aria-labelledby="activity-title activity-description"
  >
    <title id="activity-title">TheStreamCode GitHub activity</title>
    <desc id="activity-description">Automatically updated contribution, commit, pull request, and public repository statistics.</desc>
    <defs>
      <linearGradient id="activity-accent" x1="0" x2="1">
        <stop stop-color="#60A5FA" />
        <stop offset="1" stop-color="#22D3EE" />
      </linearGradient>
    </defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .heading { fill: #F0F6FC; font-size: 22px; font-weight: 700; }
      .muted { fill: #9198A1; font-size: 13px; }
      .metric { fill: #F0F6FC; font-size: 30px; font-weight: 700; }
      .label { fill: #9198A1; font-size: 10px; font-weight: 600; letter-spacing: .6px; }
    </style>
    <rect x=".5" y=".5" width="879" height="229" rx="16" fill="#0D1117" stroke="#30363D" />
    <rect x="1" y="1" width="878" height="4" rx="2" fill="url(#activity-accent)" />

    <g aria-hidden="true" transform="translate(32 27)">
      <rect width="16" height="12" rx="3" fill="#60A5FA" />
      <rect x="19" width="10" height="12" rx="3" fill="#22D3EE" />
      <rect y="15" width="10" height="8" rx="3" fill="#22D3EE" />
      <rect x="13" y="15" width="16" height="8" rx="3" fill="#60A5FA" />
    </g>
    <text x="75" y="47" class="heading">GitHub activity</text>
    <text x="75" y="69" class="muted">Verified through the GitHub GraphQL API</text>


        <text x="40" y="142" class="metric">2,729</text>
        <text x="40" y="170" class="label">CONTRIBUTIONS SINCE 2024</text>
        <line x1="230" y1="104" x2="230" y2="185" stroke="#30363D" />
        <text x="250" y="142" class="metric">2,645</text>
        <text x="250" y="170" class="label">COMMIT CONTRIBUTIONS</text>
        <line x1="440" y1="104" x2="440" y2="185" stroke="#30363D" />
        <text x="460" y="142" class="metric">36</text>
        <text x="460" y="170" class="label">PULL REQUESTS</text>
        <line x1="650" y1="104" x2="650" y2="185" stroke="#30363D" />
        <text x="670" y="142" class="metric">19</text>
        <text x="670" y="170" class="label">ORIGINAL PUBLIC REPOS</text>
    <circle cx="40" cy="207" r="4" fill="#3FB950" />
    <text x="52" y="211" class="muted">Updated automatically · 23 Jul 2026</text>
  </svg>
