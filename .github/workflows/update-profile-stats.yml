name: Update profile stats

on:
  schedule:
    # Every Monday at 03:17 UTC.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-stats
  cancel-in-progress: true

jobs:
  update:
    name: Generate profile cards
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Generate cards from GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-profile-stats.mjs

      - name: Validate generated files
        run: |
          git diff --check
          test -s profile/activity-light.svg
          test -s profile/activity-dark.svg
          test -s profile/languages-light.svg
          test -s profile/languages-dark.svg

      - name: Publish refreshed cards
        shell: bash
        run: |
          publish_directory="${RUNNER_TEMP}/profile-stats"

          if git fetch --depth=1 origin profile-stats; then
            git worktree add --detach "${publish_directory}" FETCH_HEAD
          else
            git worktree add --detach "${publish_directory}" HEAD
            cd "${publish_directory}"
            git switch --orphan profile-stats
          fi

          mkdir -p "${publish_directory}/profile"
          cp "${GITHUB_WORKSPACE}"/profile/*.svg "${publish_directory}/profile/"
          cd "${publish_directory}"

          git add profile/*.svg

          if git diff --cached --quiet; then
            echo "Profile statistics are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh profile stats"
          git push origin HEAD:profile-stats
