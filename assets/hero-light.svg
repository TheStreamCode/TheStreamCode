<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" fill="none" role="img" aria-labelledby="t">
  <title id="t">Michael Gasperini — Open-source developer and founder of Mikesoft</title>
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#15803D"/>
      <stop offset="0.55" stop-color="#174EA6"/>
      <stop offset="1" stop-color="#174EA6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <text x="4" y="46" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" fill="#15803D">OPEN-SOURCE DEVELOPER &#183; FOUNDER OF MIKESOFT</text>
  <text x="2" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="#1F2328">Michael Gasperini<tspan fill="#15803D">.</tspan></text>
  <line x1="4" y1="140" x2="896" y2="140" stroke="url(#rule)" stroke-width="2" stroke-linecap="round" stroke-dasharray="892" stroke-dashoffset="892">
    <animate attributeName="stroke-dashoffset" values="892;0" dur="1.2s" begin="0.15s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
  </line>
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
    <text x="4" y="178" font-size="17" fill="#57606A">Small, focused, privacy-aware tools &#8212; and web products designed through Mikesoft.</text>
    <text x="4" y="206" font-size="13" fill="#8B949E" letter-spacing="0.3">Italy &#183; TypeScript &#183; React &#183; WordPress &#183; 10+ years building for the web</text>
  </g>
</svg>
