<svg xmlns="http://www.w3.org/2000/svg" width="480" height="190" viewBox="0 0 480 190" role="img" aria-labelledby="title desc">
  <title id="title">TheStreamCode language focus</title>
  <desc id="desc">Static language and project focus card for TheStreamCode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="52%" stop-color="#182236"/>
      <stop offset="100%" stop-color="#10243F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3178C6"/>
      <stop offset="55%" stop-color="#F7DF1E"/>
      <stop offset="100%" stop-color="#777BB4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="480" height="190" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="478" height="188" rx="17" fill="none" stroke="#30363D"/>
  <text x="24" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#8B949E">Language focus</text>
  <text x="24" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#F0F6FC">Products, tools, and client work</text>
  <rect x="24" y="94" width="432" height="12" rx="6" fill="#21262D"/>
  <rect x="24" y="94" width="190" height="12" rx="6" fill="#3178C6"/>
  <rect x="206" y="94" width="170" height="12" fill="#F7DF1E"/>
  <rect x="368" y="94" width="58" height="12" fill="#777BB4"/>
  <rect x="418" y="94" width="38" height="12" rx="6" fill="#3FB950"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <circle cx="31" cy="130" r="5" fill="#3178C6"/>
    <text x="44" y="135" fill="#C9D1D9">TypeScript: Astro, React Native, MCP, VS Code</text>
    <circle cx="31" cy="154" r="5" fill="#F7DF1E"/>
    <text x="44" y="159" fill="#C9D1D9">JavaScript: CLI launchers and developer workflow tools</text>
    <circle cx="31" cy="178" r="5" fill="#777BB4"/>
    <text x="44" y="183" fill="#C9D1D9">PHP / WordPress: plugins and private admin workspaces</text>
  </g>
</svg>
